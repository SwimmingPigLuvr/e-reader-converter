<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Reader Image Converter</title>
  <style>
    /* =============================================
       THEME SYSTEM - Unique Visual Identities
       ============================================= */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:wght@400;600&display=swap');

    :root {
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* =============================================
       THEME 1: CYBER - Neon tech with scanlines
       ============================================= */
    [data-theme="cyber"] {
      --font-main: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #050508;
      --bg-secondary: #0a0a12;
      --bg-tertiary: #0f0f1a;
      --bg-hover: #141420;
      --text-primary: #e0e8ff;
      --text-secondary: #7080a0;
      --text-muted: #404860;
      --accent: #00f0ff;
      --accent-secondary: #ff00aa;
      --accent-glow: rgba(0, 240, 255, 0.5);
      --border: #1a1a2e;
      --radius: 4px;
      --shadow: 0 0 40px rgba(0, 240, 255, 0.15);
    }

    [data-theme="cyber"] body {
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.03) 2px, rgba(0, 240, 255, 0.03) 4px),
        linear-gradient(180deg, #050508 0%, #0a0a15 100%);
    }

    [data-theme="cyber"] .panel {
      border: 1px solid var(--border);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.1), inset 0 1px 0 rgba(0, 240, 255, 0.1);
      position: relative;
    }

    [data-theme="cyber"] .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    [data-theme="cyber"] h1 {
      background: linear-gradient(135deg, #00f0ff, #ff00aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 60px rgba(0, 240, 255, 0.5);
    }

    [data-theme="cyber"] .option-btn.selected {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(255, 0, 170, 0.2));
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.1);
    }

    [data-theme="cyber"] .btn-primary {
      background: linear-gradient(135deg, #00f0ff, #ff00aa);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
    }

    /* =============================================
       THEME 2: MINIMAL - Swiss precision
       ============================================= */
    [data-theme="minimal"] {
      --font-main: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f5f5f5;
      --bg-hover: #eeeeee;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --accent: #1a1a1a;
      --accent-secondary: #666666;
      --accent-glow: rgba(0, 0, 0, 0.1);
      --border: #e5e5e5;
      --radius: 0;
      --shadow: none;
    }

    [data-theme="minimal"] body {
      background: #ffffff;
    }

    [data-theme="minimal"] .panel {
      border: 1px solid var(--border);
      box-shadow: none;
    }

    [data-theme="minimal"] h1 {
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    [data-theme="minimal"] .option-btn {
      border: 1px solid var(--border);
    }

    [data-theme="minimal"] .option-btn.selected {
      background: var(--text-primary);
      color: #ffffff;
      border-color: var(--text-primary);
    }

    [data-theme="minimal"] .option-btn.selected .option-desc {
      color: rgba(255, 255, 255, 0.7);
    }

    [data-theme="minimal"] .btn-primary {
      background: var(--text-primary);
      border: none;
    }

    [data-theme="minimal"] .panel-header::before { display: none; }

    /* =============================================
       THEME 3: SYNTHWAVE - Retro 80s sunset
       ============================================= */
    [data-theme="synthwave"] {
      --font-main: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #1a0a2e;
      --bg-secondary: #2d1b4e;
      --bg-tertiary: #3d2560;
      --bg-hover: #4a2d70;
      --text-primary: #f5e6ff;
      --text-secondary: #c9a0dc;
      --text-muted: #8a60a0;
      --accent: #ff2975;
      --accent-secondary: #f9c80e;
      --accent-glow: rgba(255, 41, 117, 0.5);
      --border: #4a2d70;
      --radius: 0;
      --shadow: 0 10px 40px rgba(255, 41, 117, 0.2);
    }

    [data-theme="synthwave"] body {
      background:
        linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 40%, #ff2975 100%),
        linear-gradient(180deg, #1a0a2e 0%, #1a0a2e 100%);
      background-size: 100% 200%, 100% 100%;
      background-position: 0 0;
    }

    [data-theme="synthwave"] body::before {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background:
        repeating-linear-gradient(90deg, rgba(255, 41, 117, 0.1) 0px, rgba(255, 41, 117, 0.1) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255, 41, 117, 0.1) 0px, rgba(255, 41, 117, 0.1) 1px, transparent 1px, transparent 60px);
      transform: perspective(500px) rotateX(60deg);
      transform-origin: top;
      pointer-events: none;
      opacity: 0.5;
    }

    [data-theme="synthwave"] .panel {
      border: 2px solid var(--border);
      box-shadow: 0 0 30px rgba(255, 41, 117, 0.2);
    }

    [data-theme="synthwave"] h1 {
      background: linear-gradient(180deg, #f9c80e, #ff2975);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 80px rgba(255, 41, 117, 0.8);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    [data-theme="synthwave"] .option-btn.selected {
      background: linear-gradient(180deg, rgba(255, 41, 117, 0.3), rgba(249, 200, 14, 0.1));
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px rgba(255, 41, 117, 0.4);
    }

    [data-theme="synthwave"] .btn-primary {
      background: linear-gradient(180deg, #f9c80e, #ff2975);
      box-shadow: 0 0 30px rgba(255, 41, 117, 0.5);
    }

    /* =============================================
       THEME 4: NEUMORPHIC - Soft extruded plastic
       ============================================= */
    [data-theme="neumorphic"] {
      --font-main: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #e0e5ec;
      --bg-secondary: #e0e5ec;
      --bg-tertiary: #e0e5ec;
      --bg-hover: #d5dae1;
      --text-primary: #3d4a5c;
      --text-secondary: #6b7b8f;
      --text-muted: #9aa5b1;
      --accent: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --border: transparent;
      --radius: 20px;
      --shadow: 8px 8px 20px #b8bec5, -8px -8px 20px #ffffff;
    }

    [data-theme="neumorphic"] body {
      background: #e0e5ec;
    }

    [data-theme="neumorphic"] .panel {
      border: none;
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    [data-theme="neumorphic"] h1 {
      color: var(--text-primary);
      text-shadow: 2px 2px 4px #b8bec5, -2px -2px 4px #ffffff;
    }

    [data-theme="neumorphic"] .option-btn {
      border: none;
      box-shadow: 6px 6px 12px #b8bec5, -6px -6px 12px #ffffff;
      border-radius: 16px;
    }

    [data-theme="neumorphic"] .option-btn:hover {
      box-shadow: 4px 4px 8px #b8bec5, -4px -4px 8px #ffffff;
    }

    [data-theme="neumorphic"] .option-btn.selected {
      box-shadow: inset 4px 4px 10px #b8bec5, inset -4px -4px 10px #ffffff;
      background: #e0e5ec;
    }

    [data-theme="neumorphic"] .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      box-shadow: 6px 6px 16px #b8bec5, -6px -6px 16px #ffffff;
    }

    [data-theme="neumorphic"] .custom-slider {
      box-shadow: inset 3px 3px 6px #b8bec5, inset -3px -3px 6px #ffffff;
    }

    /* =============================================
       THEME 5: GLASS - Frosted transparency
       ============================================= */
    [data-theme="glass"] {
      --font-main: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #0f0f23;
      --bg-secondary: rgba(255, 255, 255, 0.05);
      --bg-tertiary: rgba(255, 255, 255, 0.08);
      --bg-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);
      --accent: #818cf8;
      --accent-secondary: #c084fc;
      --accent-glow: rgba(129, 140, 248, 0.4);
      --border: rgba(255, 255, 255, 0.1);
      --radius: 24px;
      --shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    [data-theme="glass"] body {
      background:
        radial-gradient(ellipse at 20% 20%, rgba(129, 140, 248, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(192, 132, 252, 0.15) 0%, transparent 50%),
        linear-gradient(180deg, #0f0f23 0%, #1a1a3e 100%);
    }

    [data-theme="glass"] .panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border-radius: var(--radius);
    }

    [data-theme="glass"] h1 {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    [data-theme="glass"] .option-btn {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
    }

    [data-theme="glass"] .option-btn.selected {
      background: rgba(129, 140, 248, 0.2);
      border-color: rgba(129, 140, 248, 0.5);
      box-shadow: 0 0 30px rgba(129, 140, 248, 0.3);
    }

    [data-theme="glass"] .btn-primary {
      background: linear-gradient(135deg, rgba(129, 140, 248, 0.8), rgba(192, 132, 252, 0.8));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* =============================================
       THEME 6: TERMINAL - CRT hacker aesthetic
       ============================================= */
    [data-theme="terminal"] {
      --font-main: 'JetBrains Mono', monospace;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #0a0a0a;
      --bg-secondary: #0f0f0f;
      --bg-tertiary: #141414;
      --bg-hover: #1a1a1a;
      --text-primary: #00ff00;
      --text-secondary: #00cc00;
      --text-muted: #008800;
      --accent: #00ff00;
      --accent-secondary: #00ff88;
      --accent-glow: rgba(0, 255, 0, 0.4);
      --border: #00ff0022;
      --radius: 0;
      --shadow: 0 0 50px rgba(0, 255, 0, 0.1);
    }

    [data-theme="terminal"] body {
      background: #0a0a0a;
      position: relative;
    }

    [data-theme="terminal"] body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1000;
    }

    [data-theme="terminal"] body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
      pointer-events: none;
      z-index: 999;
    }

    [data-theme="terminal"] .panel {
      border: 1px solid var(--accent);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.1), inset 0 0 60px rgba(0, 255, 0, 0.03);
    }

    [data-theme="terminal"] h1 {
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      font-weight: 400;
    }

    [data-theme="terminal"] h1::before {
      content: '> ';
    }

    [data-theme="terminal"] .panel-header::before {
      content: '// ';
      color: var(--text-muted);
      background: none;
      width: auto;
      height: auto;
      border-radius: 0;
    }

    [data-theme="terminal"] .option-btn {
      border: 1px solid var(--border);
      font-family: var(--font-mono);
    }

    [data-theme="terminal"] .option-btn.selected {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
      background: rgba(0, 255, 0, 0.1);
    }

    [data-theme="terminal"] .option-btn.selected::before {
      content: '█ ';
      color: var(--accent);
    }

    [data-theme="terminal"] .btn-primary {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }

    [data-theme="terminal"] .btn-primary:hover {
      background: rgba(0, 255, 0, 0.1);
    }

    /* =============================================
       THEME 7: BRUTALIST - Raw concrete
       ============================================= */
    [data-theme="brutalist"] {
      --font-main: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #d4d4d4;
      --bg-secondary: #e8e8e8;
      --bg-tertiary: #f0f0f0;
      --bg-hover: #c8c8c8;
      --text-primary: #000000;
      --text-secondary: #333333;
      --text-muted: #666666;
      --accent: #ff0000;
      --accent-secondary: #000000;
      --accent-glow: none;
      --border: #000000;
      --radius: 0;
      --shadow: 6px 6px 0 #000000;
    }

    [data-theme="brutalist"] body {
      background:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E"),
        #d4d4d4;
    }

    [data-theme="brutalist"] .panel {
      border: 3px solid var(--border);
      box-shadow: var(--shadow);
    }

    [data-theme="brutalist"] h1 {
      color: var(--text-primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    [data-theme="brutalist"] .panel-header {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      border-bottom: 3px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    [data-theme="brutalist"] .panel-header::before { display: none; }

    [data-theme="brutalist"] .option-btn {
      border: 3px solid var(--border);
      box-shadow: 4px 4px 0 var(--border);
      font-weight: 600;
    }

    [data-theme="brutalist"] .option-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--border);
    }

    [data-theme="brutalist"] .option-btn.selected {
      background: var(--accent);
      color: #ffffff;
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--border);
    }

    [data-theme="brutalist"] .btn-primary {
      background: #000000;
      border: 3px solid #000000;
      box-shadow: 6px 6px 0 var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    [data-theme="brutalist"] .btn-primary:hover {
      box-shadow: 8px 8px 0 var(--accent);
      transform: translate(-2px, -2px);
    }

    /* =============================================
       THEME 8: VAPOR - Dreamy pastel aesthetic
       ============================================= */
    [data-theme="vapor"] {
      --font-main: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #ffeef8;
      --bg-secondary: #fff5fa;
      --bg-tertiary: #ffebf5;
      --bg-hover: #ffe0ef;
      --text-primary: #4a2040;
      --text-secondary: #7a4070;
      --text-muted: #aa70a0;
      --accent: #ff6ad5;
      --accent-secondary: #7ee8fa;
      --accent-glow: rgba(255, 106, 213, 0.3);
      --border: #ffc0e0;
      --radius: 30px;
      --shadow: 0 20px 60px rgba(255, 106, 213, 0.15);
    }

    [data-theme="vapor"] body {
      background:
        linear-gradient(135deg,
          rgba(126, 232, 250, 0.2) 0%,
          rgba(255, 106, 213, 0.2) 50%,
          rgba(255, 238, 173, 0.2) 100%),
        linear-gradient(180deg, #ffeef8 0%, #e8f0ff 100%);
    }

    [data-theme="vapor"] .panel {
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    [data-theme="vapor"] h1 {
      background: linear-gradient(135deg, #ff6ad5, #7ee8fa, #ffeead);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
    }

    [data-theme="vapor"] .option-btn {
      background: rgba(255, 255, 255, 0.6);
      border: 2px solid var(--border);
      border-radius: 20px;
    }

    [data-theme="vapor"] .option-btn.selected {
      background: linear-gradient(135deg, rgba(255, 106, 213, 0.2), rgba(126, 232, 250, 0.2));
      border-color: var(--accent);
      box-shadow: 0 10px 40px rgba(255, 106, 213, 0.2);
    }

    [data-theme="vapor"] .btn-primary {
      background: linear-gradient(135deg, #ff6ad5, #7ee8fa);
      border: none;
      box-shadow: 0 10px 40px rgba(255, 106, 213, 0.3);
      border-radius: 20px;
    }

    /* =============================================
       THEME 9: LUXURY - Rich gold elegance
       ============================================= */
    [data-theme="luxury"] {
      --font-main: 'Playfair Display', serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #0a0a0a;
      --bg-secondary: #121212;
      --bg-tertiary: #1a1a1a;
      --bg-hover: #222222;
      --text-primary: #f5f0e8;
      --text-secondary: #a09080;
      --text-muted: #605040;
      --accent: #d4a574;
      --accent-secondary: #c9a227;
      --accent-glow: rgba(212, 165, 116, 0.3);
      --border: #2a2520;
      --radius: 8px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    [data-theme="luxury"] body {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(212, 165, 116, 0.1) 0%, transparent 50%),
        #0a0a0a;
    }

    [data-theme="luxury"] .panel {
      background: linear-gradient(180deg, #151515 0%, #0f0f0f 100%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(212, 165, 116, 0.1);
    }

    [data-theme="luxury"] h1 {
      background: linear-gradient(135deg, #d4a574, #f5deb3, #d4a574);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    [data-theme="luxury"] .panel-header {
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3em;
    }

    [data-theme="luxury"] .option-btn {
      border: 1px solid var(--border);
      font-family: 'Inter', sans-serif;
    }

    [data-theme="luxury"] .option-btn.selected {
      border-color: var(--accent);
      background: linear-gradient(180deg, rgba(212, 165, 116, 0.15) 0%, rgba(212, 165, 116, 0.05) 100%);
      box-shadow: 0 0 30px rgba(212, 165, 116, 0.15);
    }

    [data-theme="luxury"] .btn-primary {
      background: linear-gradient(135deg, #d4a574, #c9a227);
      border: none;
      color: #0a0a0a;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    /* =============================================
       THEME 10: PAPER - Sketch notebook
       ============================================= */
    [data-theme="paper"] {
      --font-main: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg-primary: #faf8f5;
      --bg-secondary: #f5f2ed;
      --bg-tertiary: #efebe5;
      --bg-hover: #e8e4dd;
      --text-primary: #2d2a26;
      --text-secondary: #5c5752;
      --text-muted: #8c8580;
      --accent: #e85d04;
      --accent-secondary: #2d2a26;
      --accent-glow: rgba(232, 93, 4, 0.2);
      --border: #d4cfc7;
      --radius: 4px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    [data-theme="paper"] body {
      background:
        repeating-linear-gradient(0deg, transparent, transparent 27px, #e8e4dd 27px, #e8e4dd 28px),
        #faf8f5;
    }

    [data-theme="paper"] .panel {
      background: #fffdf9;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
    }

    [data-theme="paper"] .panel::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }

    [data-theme="paper"] h1 {
      color: var(--text-primary);
      font-weight: 600;
      position: relative;
      display: inline-block;
    }

    [data-theme="paper"] h1::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4px;
      height: 3px;
      background: var(--accent);
    }

    [data-theme="paper"] .option-btn {
      border: 2px dashed var(--border);
      background: #fffdf9;
    }

    [data-theme="paper"] .option-btn.selected {
      border-style: solid;
      border-color: var(--accent);
      background: rgba(232, 93, 4, 0.05);
    }

    [data-theme="paper"] .btn-primary {
      background: var(--accent);
      border: none;
      box-shadow: 0 4px 12px rgba(232, 93, 4, 0.3);
    }

    [data-theme="paper"] .panel-header::before {
      background: var(--accent);
    }

    /* =============================================
       BASE STYLES
       ============================================= */
    body {
      font-family: var(--font-main);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    /* =============================================
       HEADER & THEME SWITCHER
       ============================================= */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .info {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .theme-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 20px;
      background: var(--bg-secondary);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .theme-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 2px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      min-width: 80px;
    }

    .theme-btn:hover {
      background: var(--bg-hover);
      transform: translateY(-2px);
    }

    .theme-btn.active {
      border-color: var(--accent);
      background: var(--bg-hover);
    }

    .theme-preview {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
    }

    .theme-btn[data-theme="cyber"] .theme-preview { background: linear-gradient(135deg, #050508, #00f0ff); }
    .theme-btn[data-theme="minimal"] .theme-preview { background: linear-gradient(135deg, #ffffff, #1a1a1a); border: 1px solid #e5e5e5; }
    .theme-btn[data-theme="synthwave"] .theme-preview { background: linear-gradient(180deg, #1a0a2e, #ff2975); }
    .theme-btn[data-theme="neumorphic"] .theme-preview { background: #e0e5ec; box-shadow: 3px 3px 6px #b8bec5, -3px -3px 6px #ffffff; }
    .theme-btn[data-theme="glass"] .theme-preview { background: linear-gradient(135deg, #0f0f23, #818cf8); }
    .theme-btn[data-theme="terminal"] .theme-preview { background: linear-gradient(135deg, #0a0a0a, #00ff00); }
    .theme-btn[data-theme="brutalist"] .theme-preview { background: #d4d4d4; border: 2px solid #000; }
    .theme-btn[data-theme="vapor"] .theme-preview { background: linear-gradient(135deg, #ff6ad5, #7ee8fa); }
    .theme-btn[data-theme="luxury"] .theme-preview { background: linear-gradient(135deg, #0a0a0a, #d4a574); }
    .theme-btn[data-theme="paper"] .theme-preview { background: #faf8f5; border: 2px dashed #d4cfc7; }

    .theme-name {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    /* =============================================
       DROPZONE
       ============================================= */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 24px;
      transition: all var(--transition);
      background: var(--bg-secondary);
    }

    .dropzone:hover {
      border-color: var(--accent);
      background: var(--bg-tertiary);
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: var(--bg-hover);
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .dropzone.minimized {
      padding: 16px;
      margin-bottom: 20px;
    }

    .dropzone p {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .dropzone-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    input[type="file"] { display: none; }

    /* =============================================
       OPTION BUTTON GROUPS (Replaces Dropdowns)
       ============================================= */
    .option-group {
      display: grid;
      gap: 10px;
    }

    .option-group.cols-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .option-group.cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .option-group.cols-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .option-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }

    .option-btn:hover {
      background: var(--bg-hover);
    }

    .option-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .option-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .option-desc {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.3;
    }

    /* Compact option buttons for shades */
    .option-btn.compact {
      padding: 10px 8px;
    }

    .option-btn.compact .option-icon {
      font-size: 1.2rem;
    }

    .option-btn.compact .option-label {
      font-size: 0.75rem;
    }

    .option-btn.compact .option-desc {
      font-size: 0.65rem;
    }

    /* =============================================
       CUSTOM BUTTONS
       ============================================= */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-main);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn:hover {
      background: var(--bg-hover);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 0.8rem;
    }

    /* =============================================
       CUSTOM SLIDER
       ============================================= */
    .slider-container {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .custom-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--accent-glow);
      transition: all var(--transition);
    }

    .custom-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .custom-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-value {
      min-width: 52px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 600;
    }

    /* =============================================
       CUSTOM TEXT INPUT
       ============================================= */
    .custom-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      transition: all var(--transition);
    }

    .custom-input:hover {
      border-color: var(--text-muted);
    }

    .custom-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* =============================================
       PANELS & CARDS
       ============================================= */
    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      transition: all var(--transition);
    }

    .panel-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-header::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* =============================================
       LAYOUT
       ============================================= */
    .editor { display: none; }
    .editor.visible { display: block; }

    .editor-layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .left-column {
      flex: 1;
      min-width: 0;
      max-width: 50%;
    }

    .right-column {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: sticky;
      top: 20px;
    }

    /* =============================================
       NAVIGATION
       ============================================= */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .counter {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .counter strong {
      color: var(--accent);
      font-weight: 600;
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
    }

    /* =============================================
       ORIGINAL IMAGE SECTION
       ============================================= */
    .original-section {
      margin-bottom: 20px;
    }

    .original-img {
      width: 100%;
      max-width: 200px;
      height: auto;
      aspect-ratio: 480 / 800;
      object-fit: contain;
      border-radius: var(--radius);
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
    }

    .file-info {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 12px;
      font-family: var(--font-mono);
    }

    .file-info strong {
      color: var(--text-primary);
      font-weight: 500;
    }

    /* =============================================
       CONTROL GROUPS
       ============================================= */
    .control-group {
      margin-bottom: 24px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* =============================================
       THUMBNAIL STRIP
       ============================================= */
    .thumb-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }

    .thumb-strip::-webkit-scrollbar {
      height: 6px;
    }

    .thumb-strip::-webkit-scrollbar-track {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    .thumb-strip::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 3px;
    }

    .thumb-item {
      flex-shrink: 0;
      width: 42px;
      height: 70px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      position: relative;
      transition: all var(--transition);
    }

    .thumb-item:hover {
      transform: scale(1.05);
    }

    .thumb-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb-remove {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(220, 38, 38, 0.9);
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 10px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .thumb-item:hover .thumb-remove {
      display: flex;
    }

    /* =============================================
       APPLY PANEL
       ============================================= */
    .apply-panel {
      display: none;
    }

    .apply-panel.visible {
      display: block;
    }

    .apply-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .apply-row .control-group {
      flex: 1;
      min-width: 100px;
      margin-bottom: 0;
    }

    .apply-row .btn-group {
      display: flex;
      gap: 8px;
    }

    /* Small option group for apply panel */
    .apply-row .option-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .apply-row .option-btn {
      padding: 8px 12px;
      flex: none;
    }

    .apply-row .option-btn .option-icon {
      display: none;
    }

    .apply-row .option-btn .option-desc {
      display: none;
    }

    .apply-row .option-btn .option-label {
      font-size: 0.75rem;
    }

    /* =============================================
       STATUS
       ============================================= */
    .status {
      text-align: center;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }

    .status.visible {
      display: block;
    }

    .status.error {
      border-color: #dc2626;
      color: #dc2626;
    }

    /* =============================================
       ACTIONS
       ============================================= */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* =============================================
       DEVICE MOCKUP
       ============================================= */
    .device-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .device-color-toggle {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .device-color-toggle span {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .color-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
    }

    .color-btn:hover {
      transform: scale(1.1);
    }

    .color-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .color-btn.black {
      background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    }

    .color-btn.white {
      background: linear-gradient(145deg, #f5f5f0, #e8e8e3);
    }

    .device-frame {
      position: relative;
      padding: 28px 18px 44px 18px;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
      transition: all var(--transition);
    }

    .device-frame.black {
      background: linear-gradient(165deg, #2d2d2d 0%, #1a1a1a 50%, #0d0d0d 100%);
    }

    .device-frame.white {
      background: linear-gradient(165deg, #f0f0eb 0%, #e5e5e0 50%, #d8d8d3 100%);
    }

    .device-frame::before {
      content: 'XTEINK';
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      opacity: 0.4;
    }

    .device-frame.black::before { color: #555; }
    .device-frame.white::before { color: #aaa; }

    .device-frame::after {
      content: '';
      position: absolute;
      top: 80px;
      right: -4px;
      width: 4px;
      height: 44px;
      border-radius: 0 3px 3px 0;
    }

    .device-frame.black::after { background: linear-gradient(180deg, #3a3a3a, #2a2a2a); }
    .device-frame.white::after { background: linear-gradient(180deg, #d0d0d0, #bbb); }

    .eink-screen {
      position: relative;
      width: 288px;
      height: 480px;
      border-radius: 4px;
      overflow: hidden;
      background: #d8d6d0;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.12);
    }

    .eink-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 2;
    }

    .preview-canvas {
      display: block;
      width: 288px;
      height: 480px;
      filter: grayscale(100%) contrast(0.9);
    }

    .device-specs {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      font-family: var(--font-mono);
    }

    /* =============================================
       RESPONSIVE
       ============================================= */
    @media (max-width: 900px) {
      .editor-layout {
        flex-direction: column-reverse;
      }

      .right-column {
        position: static;
        width: 100%;
        margin-bottom: 24px;
      }

      .left-column {
        max-width: 100%;
        width: 100%;
      }

      .option-group.cols-4 {
        grid-template-columns: repeat(2, 1fr);
      }

      .theme-switcher {
        padding: 12px;
        gap: 6px;
      }

      .theme-btn {
        padding: 8px 10px;
        min-width: 60px;
      }

      .theme-preview {
        width: 24px;
        height: 24px;
      }

      .theme-name {
        font-size: 0.6rem;
      }
    }

    @media (max-width: 500px) {
      .option-group.cols-2,
      .option-group.cols-3,
      .option-group.cols-4 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>E-Reader Converter</h1>
      <p class="info">Converts to 480×800 BMP for Xteink X4</p>
    </header>

    <div class="theme-switcher">
      <button class="theme-btn active" data-theme="cyber" title="Cyber">
        <div class="theme-preview"></div>
        <span class="theme-name">Cyber</span>
      </button>
      <button class="theme-btn" data-theme="minimal" title="Minimal">
        <div class="theme-preview"></div>
        <span class="theme-name">Minimal</span>
      </button>
      <button class="theme-btn" data-theme="synthwave" title="Synthwave">
        <div class="theme-preview"></div>
        <span class="theme-name">Synth</span>
      </button>
      <button class="theme-btn" data-theme="neumorphic" title="Neumorphic">
        <div class="theme-preview"></div>
        <span class="theme-name">Neumo</span>
      </button>
      <button class="theme-btn" data-theme="glass" title="Glass">
        <div class="theme-preview"></div>
        <span class="theme-name">Glass</span>
      </button>
      <button class="theme-btn" data-theme="terminal" title="Terminal">
        <div class="theme-preview"></div>
        <span class="theme-name">Term</span>
      </button>
      <button class="theme-btn" data-theme="brutalist" title="Brutalist">
        <div class="theme-preview"></div>
        <span class="theme-name">Brutal</span>
      </button>
      <button class="theme-btn" data-theme="vapor" title="Vapor">
        <div class="theme-preview"></div>
        <span class="theme-name">Vapor</span>
      </button>
      <button class="theme-btn" data-theme="luxury" title="Luxury">
        <div class="theme-preview"></div>
        <span class="theme-name">Luxury</span>
      </button>
      <button class="theme-btn" data-theme="paper" title="Paper">
        <div class="theme-preview"></div>
        <span class="theme-name">Paper</span>
      </button>
    </div>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">+</div>
      <p>Drop images here or tap to select</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>

    <div class="editor" id="editor">
      <div class="editor-layout">
        <div class="left-column">
          <div class="nav-row">
            <div class="counter">
              Image <strong><span id="currentIndex">1</span></strong> of <strong><span id="totalCount">1</span></strong>
            </div>
            <div class="nav-buttons">
              <button class="btn btn-sm" id="prevBtn">← Prev</button>
              <button class="btn btn-sm" id="nextBtn">Next →</button>
            </div>
          </div>

          <div class="panel original-section">
            <div class="panel-header">Original</div>
            <img class="original-img" id="originalImg">
            <div class="file-info" id="fileInfo"></div>
          </div>

          <div class="panel">
            <div class="panel-header">Settings</div>

            <div class="control-group">
              <label class="control-label">Fit Mode</label>
              <div class="option-group cols-2" id="fitGroup">
                <button class="option-btn selected" data-value="crop">
                  <span class="option-icon">⬚</span>
                  <span class="option-label">Center Crop</span>
                  <span class="option-desc">Fills frame, trims edges</span>
                </button>
                <button class="option-btn" data-value="letterbox-white">
                  <span class="option-icon">▢</span>
                  <span class="option-label">Letterbox Light</span>
                  <span class="option-desc">Fits inside, white bars</span>
                </button>
                <button class="option-btn" data-value="letterbox-black">
                  <span class="option-icon">■</span>
                  <span class="option-label">Letterbox Dark</span>
                  <span class="option-desc">Fits inside, black bars</span>
                </button>
                <button class="option-btn" data-value="stretch">
                  <span class="option-icon">↔</span>
                  <span class="option-label">Stretch</span>
                  <span class="option-desc">Distorts to fill frame</span>
                </button>
              </div>
            </div>

            <div class="control-group">
              <label class="control-label">Contrast</label>
              <div class="slider-container">
                <input type="range" class="custom-slider" id="contrastSlider" min="-100" max="100" value="0">
                <span class="slider-value" id="contrastValue">0</span>
              </div>
            </div>

            <div class="control-group">
              <label class="control-label">Shades</label>
              <div class="option-group cols-4" id="shadesGroup">
                <button class="option-btn compact selected" data-value="off">
                  <span class="option-icon">◐</span>
                  <span class="option-label">Full</span>
                  <span class="option-desc">256 grays</span>
                </button>
                <button class="option-btn compact" data-value="16">
                  <span class="option-icon">▓</span>
                  <span class="option-label">16</span>
                  <span class="option-desc">Smooth</span>
                </button>
                <button class="option-btn compact" data-value="8">
                  <span class="option-icon">▒</span>
                  <span class="option-label">8</span>
                  <span class="option-desc">Medium</span>
                </button>
                <button class="option-btn compact" data-value="4">
                  <span class="option-icon">░</span>
                  <span class="option-label">4</span>
                  <span class="option-desc">Poster</span>
                </button>
                <button class="option-btn compact" data-value="2">
                  <span class="option-icon">◧</span>
                  <span class="option-label">2</span>
                  <span class="option-desc">B&W</span>
                </button>
                <button class="option-btn compact" data-value="16d">
                  <span class="option-icon">▓</span>
                  <span class="option-label">16+D</span>
                  <span class="option-desc">Dithered</span>
                </button>
                <button class="option-btn compact" data-value="8d">
                  <span class="option-icon">▒</span>
                  <span class="option-label">8+D</span>
                  <span class="option-desc">Dithered</span>
                </button>
                <button class="option-btn compact" data-value="4d">
                  <span class="option-icon">░</span>
                  <span class="option-label">4+D</span>
                  <span class="option-desc">Dithered</span>
                </button>
              </div>
            </div>

            <div class="control-group">
              <label class="control-label">Output Filename</label>
              <input type="text" class="custom-input" id="filenameInput">
            </div>
          </div>

          <div class="thumb-strip" id="thumbStrip"></div>

          <div class="panel apply-panel" id="applyPanel">
            <div class="panel-header">Apply to All</div>
            <div class="apply-row">
              <div class="control-group">
                <label class="control-label">Fit</label>
                <div class="option-group" id="applyFitGroup">
                  <button class="option-btn" data-value="crop">
                    <span class="option-label">Crop</span>
                  </button>
                  <button class="option-btn" data-value="letterbox-white">
                    <span class="option-label">LB Light</span>
                  </button>
                  <button class="option-btn" data-value="letterbox-black">
                    <span class="option-label">LB Dark</span>
                  </button>
                  <button class="option-btn" data-value="stretch">
                    <span class="option-label">Stretch</span>
                  </button>
                </div>
              </div>
              <div class="control-group">
                <label class="control-label">Contrast</label>
                <div class="slider-container">
                  <input type="range" class="custom-slider" id="applyContrast" min="-100" max="100" value="0" style="width: 80px;">
                  <span class="slider-value" id="applyContrastValue">0</span>
                </div>
              </div>
              <div class="btn-group">
                <button class="btn btn-sm" id="applyBtn">Apply</button>
                <button class="btn btn-sm btn-danger" id="clearBtn">Clear All</button>
              </div>
            </div>
          </div>

          <div class="status" id="status"></div>

          <div class="actions">
            <button class="btn btn-primary" id="convertAllBtn">Convert & Download All</button>
          </div>
        </div>

        <div class="right-column">
          <div class="device-wrapper">
            <div class="device-color-toggle">
              <span>Device</span>
              <button class="color-btn black active" id="colorBlack" title="Space Black"></button>
              <button class="color-btn white" id="colorWhite" title="Pearl White"></button>
            </div>
            <div class="device-frame black" id="deviceFrame">
              <div class="eink-screen">
                <canvas class="preview-canvas" id="previewCanvas" width="480" height="800"></canvas>
              </div>
            </div>
            <div class="device-specs">4.3" E Ink • 480×800 • 220 PPI • Grayscale</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WIDTH = 480, HEIGHT = 800;

    // Theme Switcher
    const themeBtns = document.querySelectorAll('.theme-btn');
    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        themeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.documentElement.setAttribute('data-theme', btn.dataset.theme);
        localStorage.setItem('theme', btn.dataset.theme);
      });
    });

    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
      themeBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.theme === savedTheme);
      });
    }

    // Option Group Handler
    function setupOptionGroup(groupId, onChange) {
      const group = document.getElementById(groupId);
      if (!group) return;
      const buttons = group.querySelectorAll('.option-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          if (onChange) onChange(btn.dataset.value);
        });
      });
    }

    function getOptionGroupValue(groupId) {
      const group = document.getElementById(groupId);
      if (!group) return null;
      const selected = group.querySelector('.option-btn.selected');
      return selected ? selected.dataset.value : null;
    }

    function setOptionGroupValue(groupId, value) {
      const group = document.getElementById(groupId);
      if (!group) return;
      const buttons = group.querySelectorAll('.option-btn');
      buttons.forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });
    }

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const editor = document.getElementById('editor');
    const thumbStrip = document.getElementById('thumbStrip');
    const applyPanel = document.getElementById('applyPanel');
    const convertAllBtn = document.getElementById('convertAllBtn');
    const statusEl = document.getElementById('status');

    const originalImg = document.getElementById('originalImg');
    const previewCanvas = document.getElementById('previewCanvas');
    const previewCtx = previewCanvas.getContext('2d');
    const fileInfoEl = document.getElementById('fileInfo');
    const deviceFrame = document.getElementById('deviceFrame');

    const contrastSlider = document.getElementById('contrastSlider');
    const contrastValue = document.getElementById('contrastValue');
    const filenameInput = document.getElementById('filenameInput');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentIndexEl = document.getElementById('currentIndex');
    const totalCountEl = document.getElementById('totalCount');

    const colorBlack = document.getElementById('colorBlack');
    const colorWhite = document.getElementById('colorWhite');

    let queue = [];
    let currentIdx = 0;
    let idCounter = 0;

    // Setup option groups
    setupOptionGroup('fitGroup', () => { saveCurrentSettings(); updatePreview(); });
    setupOptionGroup('shadesGroup', () => { saveCurrentSettings(); updatePreview(); });
    setupOptionGroup('applyFitGroup', null);

    // Device color toggle
    colorBlack.onclick = () => {
      colorBlack.classList.add('active');
      colorWhite.classList.remove('active');
      deviceFrame.classList.remove('white');
      deviceFrame.classList.add('black');
    };
    colorWhite.onclick = () => {
      colorWhite.classList.add('active');
      colorBlack.classList.remove('active');
      deviceFrame.classList.remove('black');
      deviceFrame.classList.add('white');
    };

    // Dropzone events
    dropzone.onclick = () => fileInput.click();
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = () => dropzone.classList.remove('dragover');
    dropzone.ondrop = (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    };
    fileInput.onchange = (e) => { handleFiles(e.target.files); fileInput.value = ''; };

    function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        addToQueue(file);
      }
    }

    function addToQueue(file) {
      const id = ++idCounter;
      const baseName = file.name.replace(/\.[^.]+$/, '');
      const timestamp = formatTimestamp(new Date());
      const item = {
        id, file, img: null, fit: 'crop', contrast: 0, posterize: 'off',
        filename: `${baseName}_480x800_${timestamp}.bmp`
      };
      queue.push(item);

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          item.img = img;
          renderThumbnails();
          if (queue.length === 1 || queue[currentIdx]?.id === item.id) {
            showImage(queue.length - 1);
          }
          updateUI();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
      updateUI();
    }

    function formatTimestamp(date) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function removeFromQueue(id) {
      const idx = queue.findIndex(item => item.id === id);
      if (idx === -1) return;
      queue.splice(idx, 1);
      if (queue.length === 0) currentIdx = 0;
      else if (currentIdx >= queue.length) currentIdx = queue.length - 1;
      renderThumbnails();
      if (queue.length > 0) showImage(currentIdx);
      updateUI();
    }

    function updateUI() {
      const hasImages = queue.length > 0;
      const allLoaded = queue.every(item => item.img);
      editor.classList.toggle('visible', hasImages);
      dropzone.classList.toggle('minimized', hasImages);
      applyPanel.classList.toggle('visible', queue.length >= 2);
      convertAllBtn.disabled = !hasImages || !allLoaded;
      totalCountEl.textContent = queue.length;
      currentIndexEl.textContent = queue.length > 0 ? currentIdx + 1 : 0;
      prevBtn.disabled = currentIdx === 0;
      nextBtn.disabled = currentIdx >= queue.length - 1;
    }

    function renderThumbnails() {
      thumbStrip.innerHTML = '';
      queue.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'thumb-item' + (idx === currentIdx ? ' active' : '');
        div.innerHTML = `<img src="${item.img ? item.img.src : ''}"><button class="thumb-remove">×</button>`;
        div.onclick = (e) => {
          if (e.target.classList.contains('thumb-remove')) removeFromQueue(item.id);
          else showImage(idx);
        };
        thumbStrip.appendChild(div);
      });
    }

    function showImage(idx) {
      if (idx < 0 || idx >= queue.length) return;
      if (queue[currentIdx]) saveCurrentSettings();
      currentIdx = idx;
      const item = queue[idx];
      if (!item.img) return;
      originalImg.src = item.img.src;
      fileInfoEl.innerHTML = `<strong>${item.file.name}</strong><br>${item.img.width} × ${item.img.height}`;
      setOptionGroupValue('fitGroup', item.fit);
      contrastSlider.value = item.contrast;
      contrastValue.textContent = item.contrast;
      setOptionGroupValue('shadesGroup', item.posterize);
      filenameInput.value = item.filename;
      updatePreview();
      renderThumbnails();
      updateUI();
    }

    function saveCurrentSettings() {
      const item = queue[currentIdx];
      if (!item) return;
      item.fit = getOptionGroupValue('fitGroup') || 'crop';
      item.contrast = parseInt(contrastSlider.value);
      item.posterize = getOptionGroupValue('shadesGroup') || 'off';
      item.filename = filenameInput.value;
    }

    function updatePreview() {
      const item = queue[currentIdx];
      if (!item || !item.img) return;
      const fit = getOptionGroupValue('fitGroup') || 'crop';
      const posterize = getOptionGroupValue('shadesGroup') || 'off';
      const fullCanvas = document.createElement('canvas');
      fullCanvas.width = WIDTH;
      fullCanvas.height = HEIGHT;
      const fullCtx = fullCanvas.getContext('2d');
      drawFitted(fullCtx, item.img, fit);
      const imageData = fullCtx.getImageData(0, 0, WIDTH, HEIGHT);
      applyContrast(imageData, parseInt(contrastSlider.value));
      applyPosterize(imageData, posterize);
      fullCtx.putImageData(imageData, 0, 0);
      previewCtx.drawImage(fullCanvas, 0, 0);
    }

    contrastSlider.oninput = () => {
      contrastValue.textContent = contrastSlider.value;
      saveCurrentSettings();
      updatePreview();
    };
    filenameInput.oninput = () => { saveCurrentSettings(); };

    prevBtn.onclick = () => { if (currentIdx > 0) showImage(currentIdx - 1); };
    nextBtn.onclick = () => { if (currentIdx < queue.length - 1) showImage(currentIdx + 1); };

    document.getElementById('applyContrast').oninput = (e) => {
      document.getElementById('applyContrastValue').textContent = e.target.value;
    };

    document.getElementById('applyBtn').onclick = () => {
      const fit = getOptionGroupValue('applyFitGroup');
      const contrast = parseInt(document.getElementById('applyContrast').value);
      for (const item of queue) {
        if (fit) item.fit = fit;
        item.contrast = contrast;
      }
      showImage(currentIdx);
    };

    document.getElementById('clearBtn').onclick = () => {
      queue = [];
      currentIdx = 0;
      thumbStrip.innerHTML = '';
      updateUI();
    };

    convertAllBtn.onclick = async () => {
      if (queue.length === 0) return;
      saveCurrentSettings();
      convertAllBtn.disabled = true;
      statusEl.className = 'status visible';

      const filenames = new Map();
      for (const item of queue) {
        let name = item.filename.trim();
        if (!name.toLowerCase().endsWith('.bmp')) name += '.bmp';
        const baseName = name.slice(0, -4);
        let finalName = name;
        let counter = 2;
        while (filenames.has(finalName.toLowerCase())) {
          finalName = `${baseName}_${counter}.bmp`;
          counter++;
        }
        filenames.set(finalName.toLowerCase(), item);
        item._finalFilename = finalName;
      }

      for (let i = 0; i < queue.length; i++) {
        const item = queue[i];
        statusEl.textContent = `Converting ${i + 1}/${queue.length}...`;
        try {
          const blob = await processImage(item);
          downloadBlob(blob, item._finalFilename);
          if (i < queue.length - 1) await sleep(120);
        } catch (err) {
          statusEl.className = 'status visible error';
          statusEl.textContent = `Error: ${err.message}`;
          convertAllBtn.disabled = false;
          return;
        }
      }
      statusEl.textContent = `Done! Downloaded ${queue.length} file(s).`;
      convertAllBtn.disabled = false;
    };

    function drawFitted(ctx, img, fit) {
      const srcRatio = img.width / img.height;
      const dstRatio = WIDTH / HEIGHT;
      if (fit === 'crop') {
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (srcRatio > dstRatio) { sw = img.height * dstRatio; sx = (img.width - sw) / 2; }
        else { sh = img.width / dstRatio; sy = (img.height - sh) / 2; }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, WIDTH, HEIGHT);
      } else if (fit === 'letterbox-white' || fit === 'letterbox-black') {
        ctx.fillStyle = fit === 'letterbox-white' ? '#fff' : '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        let dw, dh, dx, dy;
        if (srcRatio > dstRatio) { dw = WIDTH; dh = WIDTH / srcRatio; dx = 0; dy = (HEIGHT - dh) / 2; }
        else { dh = HEIGHT; dw = HEIGHT * srcRatio; dx = (WIDTH - dw) / 2; dy = 0; }
        ctx.drawImage(img, dx, dy, dw, dh);
      } else if (fit === 'stretch') {
        ctx.drawImage(img, 0, 0, WIDTH, HEIGHT);
      }
    }

    function applyContrast(imageData, amount) {
      if (amount === 0) return;
      const data = imageData.data;
      const factor = (259 * (amount + 255)) / (255 * (259 - amount));
      for (let i = 0; i < data.length; i += 4) {
        data[i] = clamp(factor * (data[i] - 128) + 128);
        data[i + 1] = clamp(factor * (data[i + 1] - 128) + 128);
        data[i + 2] = clamp(factor * (data[i + 2] - 128) + 128);
      }
    }

    function applyPosterize(imageData, mode) {
      if (mode === 'off') return;
      const data = imageData.data;
      const dither = mode.endsWith('d');
      const shades = parseInt(mode);
      const step = 255 / (shades - 1);
      const gray = new Float32Array(WIDTH * HEIGHT);
      for (let i = 0; i < gray.length; i++) {
        const idx = i * 4;
        gray[i] = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
      }
      if (dither) {
        for (let y = 0; y < HEIGHT; y++) {
          for (let x = 0; x < WIDTH; x++) {
            const i = y * WIDTH + x;
            const oldVal = gray[i];
            const newVal = Math.round(oldVal / step) * step;
            gray[i] = newVal;
            const error = oldVal - newVal;
            if (x + 1 < WIDTH) gray[i + 1] += error * 7 / 16;
            if (y + 1 < HEIGHT) {
              if (x > 0) gray[i + WIDTH - 1] += error * 3 / 16;
              gray[i + WIDTH] += error * 5 / 16;
              if (x + 1 < WIDTH) gray[i + WIDTH + 1] += error * 1 / 16;
            }
          }
        }
      } else {
        for (let i = 0; i < gray.length; i++) gray[i] = Math.round(gray[i] / step) * step;
      }
      for (let i = 0; i < gray.length; i++) {
        const v = clamp(gray[i]);
        const idx = i * 4;
        data[idx] = data[idx + 1] = data[idx + 2] = v;
      }
    }

    function clamp(v) { return Math.max(0, Math.min(255, Math.round(v))); }

    function processImage(item) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        const ctx = canvas.getContext('2d');
        drawFitted(ctx, item.img, item.fit);
        const imageData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
        applyContrast(imageData, item.contrast);
        applyPosterize(imageData, item.posterize);
        resolve(createBMP(imageData));
      });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    function createBMP(imageData) {
      const w = WIDTH, h = HEIGHT;
      const rowSize = Math.ceil(w * 3 / 4) * 4;
      const pixelDataSize = rowSize * h;
      const headerSize = 54;
      const fileSize = headerSize + pixelDataSize;
      const buffer = new ArrayBuffer(fileSize);
      const view = new DataView(buffer);
      view.setUint8(0, 0x42); view.setUint8(1, 0x4D);
      view.setUint32(2, fileSize, true);
      view.setUint32(6, 0, true);
      view.setUint32(10, headerSize, true);
      view.setUint32(14, 40, true);
      view.setInt32(18, w, true);
      view.setInt32(22, -h, true);
      view.setUint16(26, 1, true);
      view.setUint16(28, 24, true);
      view.setUint32(30, 0, true);
      view.setUint32(34, pixelDataSize, true);
      view.setUint32(38, 2835, true);
      view.setUint32(42, 2835, true);
      view.setUint32(46, 0, true);
      view.setUint32(50, 0, true);
      const data = imageData.data;
      let offset = headerSize;
      for (let y = 0; y < h; y++) {
        const rowStart = offset;
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          view.setUint8(offset++, data[i + 2]);
          view.setUint8(offset++, data[i + 1]);
          view.setUint8(offset++, data[i]);
        }
        const padding = rowSize - (offset - rowStart);
        for (let p = 0; p < padding; p++) view.setUint8(offset++, 0);
      }
      return new Blob([buffer], { type: 'image/bmp' });
    }
  </script>
</body>
</html>
