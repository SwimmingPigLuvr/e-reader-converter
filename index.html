<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Reader Image Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111; color: #eee;
      min-height: 100vh; padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; text-align: center; }
    .info { font-size: 0.85rem; color: #888; margin-bottom: 20px; text-align: center; }

    .dropzone {
      border: 2px dashed #444; border-radius: 12px;
      padding: 40px 20px; text-align: center;
      cursor: pointer; margin-bottom: 20px;
      transition: border-color 0.2s, background 0.2s;
    }
    .dropzone:hover { border-color: #666; }
    .dropzone.dragover { border-color: #fff; background: #222; }
    input[type="file"] { display: none; }

    .btn {
      display: inline-block; padding: 12px 20px;
      background: #333; color: #fff; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    .btn:hover { background: #444; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2a6; }
    .btn-primary:hover { background: #3b7; }
    .btn-danger { background: #a33; }
    .btn-danger:hover { background: #c44; }

    /* Apply to All Panel */
    .apply-panel {
      display: none;
      background: #1a1a1a; border-radius: 12px;
      padding: 16px; margin-bottom: 20px;
      border: 1px solid #333;
    }
    .apply-panel.visible { display: block; }
    .apply-panel h3 { font-size: 1rem; margin-bottom: 12px; color: #aaa; }
    .apply-row {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    }
    .apply-row .control-group { flex: 1; min-width: 140px; }
    .apply-row .btn-group { display: flex; gap: 8px; }

    /* Queue */
    #queue { margin-bottom: 20px; }
    .queue-item {
      display: flex; gap: 12px; padding: 12px;
      background: #1a1a1a; border-radius: 10px;
      margin-bottom: 10px; border: 1px solid #333;
      position: relative;
    }
    .queue-item .thumbnail {
      width: 60px; height: 100px; object-fit: cover;
      border-radius: 6px; background: #222; flex-shrink: 0;
    }
    .queue-item .preview-canvas {
      width: 60px; height: 100px; border-radius: 6px;
      background: #222; flex-shrink: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .queue-item .details { flex: 1; min-width: 0; }
    .queue-item .file-info {
      font-size: 0.8rem; color: #888; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .queue-item .controls {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .queue-item .remove-btn {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: #333; border: none; color: #888;
      cursor: pointer; font-size: 16px; line-height: 1;
    }
    .queue-item .remove-btn:hover { background: #a33; color: #fff; }

    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-group label { font-size: 0.75rem; color: #888; }
    .control-group select, .control-group input[type="text"] {
      padding: 6px 8px; background: #222; border: 1px solid #444;
      border-radius: 6px; color: #eee; font-size: 0.85rem;
    }
    .control-group input[type="range"] {
      width: 100px; accent-color: #2a6;
    }
    .contrast-value { font-size: 0.75rem; color: #aaa; min-width: 32px; text-align: center; }
    .filename-input { width: 200px; }

    /* Bottom actions */
    .actions {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin-top: 20px;
    }

    /* Status */
    .status {
      text-align: center; padding: 12px;
      background: #1a2a1a; border-radius: 8px;
      color: #4d4; margin-bottom: 15px;
      display: none;
    }
    .status.visible { display: block; }
    .status.error { background: #2a1a1a; color: #d44; }
  </style>
</head>
<body>
  <div class="container">
    <h1>E-Reader Converter</h1>
    <p class="info">Converts to 480x800 BMP for Xteink X4</p>

    <div class="dropzone" id="dropzone">
      <p>Drop images here or tap to select</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>

    <div class="apply-panel" id="applyPanel">
      <h3>Apply to All</h3>
      <div class="apply-row">
        <div class="control-group">
          <label>Fit Mode</label>
          <select id="applyFit">
            <option value="">-- keep individual --</option>
            <option value="crop">Center crop (fill)</option>
            <option value="letterbox-white">Letterbox (white)</option>
            <option value="letterbox-black">Letterbox (black)</option>
            <option value="stretch">Stretch (smush)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Contrast</label>
          <div style="display:flex; align-items:center; gap:6px;">
            <input type="range" id="applyContrast" min="-100" max="100" value="0">
            <span class="contrast-value" id="applyContrastValue">0</span>
          </div>
        </div>
        <div class="control-group">
          <label>Posterize</label>
          <select id="applyPosterize">
            <option value="">-- keep individual --</option>
            <option value="off">Off</option>
            <option value="2">2 shades</option>
            <option value="4">4 shades</option>
            <option value="8">8 shades</option>
            <option value="16">16 shades</option>
            <option value="2d">2 shades + dither</option>
            <option value="4d">4 shades + dither</option>
            <option value="8d">8 shades + dither</option>
            <option value="16d">16 shades + dither</option>
          </select>
        </div>
        <div class="btn-group">
          <button class="btn" id="applyBtn">Apply</button>
          <button class="btn btn-danger" id="clearBtn">Clear queue</button>
        </div>
      </div>
    </div>

    <div id="queue"></div>

    <div class="status" id="status"></div>

    <div class="actions">
      <button class="btn btn-primary" id="convertAllBtn" disabled>Convert & Download All</button>
    </div>
  </div>

  <script>
    const WIDTH = 480, HEIGHT = 800;

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const queueEl = document.getElementById('queue');
    const applyPanel = document.getElementById('applyPanel');
    const convertAllBtn = document.getElementById('convertAllBtn');
    const statusEl = document.getElementById('status');

    let queue = []; // { id, file, img, fit, contrast, posterize, filename }
    let idCounter = 0;

    // Dropzone events
    dropzone.onclick = () => fileInput.click();
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = () => dropzone.classList.remove('dragover');
    dropzone.ondrop = (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    };
    fileInput.onchange = (e) => { handleFiles(e.target.files); fileInput.value = ''; };

    function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        addToQueue(file);
      }
    }

    function addToQueue(file) {
      const id = ++idCounter;
      const baseName = file.name.replace(/\.[^.]+$/, '');
      const timestamp = formatTimestamp(new Date());
      const item = {
        id,
        file,
        img: null,
        fit: 'crop',
        contrast: 0,
        posterize: 'off',
        filename: `${baseName}_480x800_${timestamp}.bmp`
      };
      queue.push(item);

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          item.img = img;
          renderQueueItem(item);
          updatePreview(item);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);

      updateUI();
    }

    function formatTimestamp(date) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function renderQueueItem(item) {
      let el = document.getElementById(`item-${item.id}`);
      if (!el) {
        el = document.createElement('div');
        el.className = 'queue-item';
        el.id = `item-${item.id}`;
        el.innerHTML = `
          <img class="thumbnail" src="${item.img.src}">
          <canvas class="preview-canvas" width="60" height="100"></canvas>
          <div class="details">
            <div class="file-info">${item.file.name} (${item.img.width}x${item.img.height})</div>
            <div class="controls">
              <div class="control-group">
                <label>Fit</label>
                <select class="fit-select">
                  <option value="crop">Center crop (fill)</option>
                  <option value="letterbox-white">Letterbox (white)</option>
                  <option value="letterbox-black">Letterbox (black)</option>
                  <option value="stretch">Stretch (smush)</option>
                </select>
              </div>
              <div class="control-group">
                <label>Contrast</label>
                <div style="display:flex; align-items:center; gap:6px;">
                  <input type="range" class="contrast-slider" min="-100" max="100" value="0">
                  <span class="contrast-value">0</span>
                </div>
              </div>
              <div class="control-group">
                <label>Posterize</label>
                <select class="posterize-select">
                  <option value="off">Off</option>
                  <option value="2">2 shades</option>
                  <option value="4">4 shades</option>
                  <option value="8">8 shades</option>
                  <option value="16">16 shades</option>
                  <option value="2d">2 shades + dither</option>
                  <option value="4d">4 shades + dither</option>
                  <option value="8d">8 shades + dither</option>
                  <option value="16d">16 shades + dither</option>
                </select>
              </div>
              <div class="control-group">
                <label>Filename</label>
                <input type="text" class="filename-input" value="${item.filename}">
              </div>
            </div>
          </div>
          <button class="remove-btn">&times;</button>
        `;
        queueEl.appendChild(el);

        // Event listeners
        el.querySelector('.fit-select').onchange = (e) => {
          item.fit = e.target.value;
          updatePreview(item);
        };
        el.querySelector('.contrast-slider').oninput = (e) => {
          item.contrast = parseInt(e.target.value);
          el.querySelector('.contrast-value').textContent = item.contrast;
          updatePreview(item);
        };
        el.querySelector('.posterize-select').onchange = (e) => {
          item.posterize = e.target.value;
          updatePreview(item);
        };
        el.querySelector('.filename-input').oninput = (e) => {
          item.filename = e.target.value;
        };
        el.querySelector('.remove-btn').onclick = () => removeFromQueue(item.id);
      }

      // Sync UI with item state
      el.querySelector('.fit-select').value = item.fit;
      el.querySelector('.contrast-slider').value = item.contrast;
      el.querySelector('.contrast-value').textContent = item.contrast;
      el.querySelector('.posterize-select').value = item.posterize;
      el.querySelector('.filename-input').value = item.filename;
    }

    function removeFromQueue(id) {
      queue = queue.filter(item => item.id !== id);
      const el = document.getElementById(`item-${id}`);
      if (el) el.remove();
      updateUI();
    }

    function updateUI() {
      applyPanel.classList.toggle('visible', queue.length >= 2);
      convertAllBtn.disabled = queue.length === 0 || queue.some(item => !item.img);
    }

    function updatePreview(item) {
      const el = document.getElementById(`item-${item.id}`);
      if (!el || !item.img) return;

      const canvas = el.querySelector('.preview-canvas');
      const ctx = canvas.getContext('2d');

      // Create full-size processed image
      const fullCanvas = document.createElement('canvas');
      fullCanvas.width = WIDTH;
      fullCanvas.height = HEIGHT;
      const fullCtx = fullCanvas.getContext('2d');

      drawFitted(fullCtx, item.img, item.fit);
      const imageData = fullCtx.getImageData(0, 0, WIDTH, HEIGHT);
      applyContrast(imageData, item.contrast);
      applyPosterize(imageData, item.posterize);
      fullCtx.putImageData(imageData, 0, 0);

      // Scale down to preview
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(fullCanvas, 0, 0, 60, 100);
    }

    function drawFitted(ctx, img, fit) {
      const srcRatio = img.width / img.height;
      const dstRatio = WIDTH / HEIGHT;

      if (fit === 'crop') {
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (srcRatio > dstRatio) {
          sw = img.height * dstRatio;
          sx = (img.width - sw) / 2;
        } else {
          sh = img.width / dstRatio;
          sy = (img.height - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, WIDTH, HEIGHT);
      } else if (fit === 'letterbox-white' || fit === 'letterbox-black') {
        ctx.fillStyle = fit === 'letterbox-white' ? '#fff' : '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        let dw, dh, dx, dy;
        if (srcRatio > dstRatio) {
          dw = WIDTH;
          dh = WIDTH / srcRatio;
          dx = 0;
          dy = (HEIGHT - dh) / 2;
        } else {
          dh = HEIGHT;
          dw = HEIGHT * srcRatio;
          dx = (WIDTH - dw) / 2;
          dy = 0;
        }
        ctx.drawImage(img, dx, dy, dw, dh);
      } else if (fit === 'stretch') {
        ctx.drawImage(img, 0, 0, WIDTH, HEIGHT);
      }
    }

    function applyContrast(imageData, amount) {
      if (amount === 0) return;
      const data = imageData.data;
      const factor = (259 * (amount + 255)) / (255 * (259 - amount));
      for (let i = 0; i < data.length; i += 4) {
        data[i] = clamp(factor * (data[i] - 128) + 128);
        data[i + 1] = clamp(factor * (data[i + 1] - 128) + 128);
        data[i + 2] = clamp(factor * (data[i + 2] - 128) + 128);
      }
    }

    function applyPosterize(imageData, mode) {
      if (mode === 'off') return;

      const data = imageData.data;
      const dither = mode.endsWith('d');
      const shades = parseInt(mode);
      const step = 255 / (shades - 1);

      // Convert to grayscale buffer (Float32 for dithering precision)
      const gray = new Float32Array(WIDTH * HEIGHT);
      for (let i = 0; i < gray.length; i++) {
        const idx = i * 4;
        gray[i] = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
      }

      if (dither) {
        // Floyd-Steinberg dithering
        for (let y = 0; y < HEIGHT; y++) {
          for (let x = 0; x < WIDTH; x++) {
            const i = y * WIDTH + x;
            const oldVal = gray[i];
            const newVal = Math.round(oldVal / step) * step;
            gray[i] = newVal;
            const error = oldVal - newVal;

            // Distribute error
            if (x + 1 < WIDTH) gray[i + 1] += error * 7 / 16;
            if (y + 1 < HEIGHT) {
              if (x > 0) gray[i + WIDTH - 1] += error * 3 / 16;
              gray[i + WIDTH] += error * 5 / 16;
              if (x + 1 < WIDTH) gray[i + WIDTH + 1] += error * 1 / 16;
            }
          }
        }
      } else {
        // Simple quantize
        for (let i = 0; i < gray.length; i++) {
          gray[i] = Math.round(gray[i] / step) * step;
        }
      }

      // Write back to imageData
      for (let i = 0; i < gray.length; i++) {
        const v = clamp(gray[i]);
        const idx = i * 4;
        data[idx] = data[idx + 1] = data[idx + 2] = v;
      }
    }

    function clamp(v) {
      return Math.max(0, Math.min(255, Math.round(v)));
    }

    // Apply to all controls
    document.getElementById('applyContrast').oninput = (e) => {
      document.getElementById('applyContrastValue').textContent = e.target.value;
    };

    document.getElementById('applyBtn').onclick = () => {
      const fit = document.getElementById('applyFit').value;
      const contrast = parseInt(document.getElementById('applyContrast').value);
      const posterize = document.getElementById('applyPosterize').value;

      for (const item of queue) {
        if (fit) item.fit = fit;
        item.contrast = contrast;
        if (posterize) item.posterize = posterize;
        renderQueueItem(item);
        updatePreview(item);
      }
    };

    document.getElementById('clearBtn').onclick = () => {
      queue = [];
      queueEl.innerHTML = '';
      updateUI();
    };

    // Convert and download all
    convertAllBtn.onclick = async () => {
      if (queue.length === 0) return;

      convertAllBtn.disabled = true;
      statusEl.className = 'status visible';

      // Dedupe filenames
      const filenames = new Map();
      for (const item of queue) {
        let name = item.filename.trim();
        if (!name.toLowerCase().endsWith('.bmp')) name += '.bmp';

        const baseName = name.slice(0, -4);
        let finalName = name;
        let counter = 2;
        while (filenames.has(finalName.toLowerCase())) {
          finalName = `${baseName}_${counter}.bmp`;
          counter++;
        }
        filenames.set(finalName.toLowerCase(), item);
        item._finalFilename = finalName;
      }

      for (let i = 0; i < queue.length; i++) {
        const item = queue[i];
        statusEl.textContent = `Converting ${i + 1}/${queue.length}...`;

        try {
          const blob = await processImage(item);
          downloadBlob(blob, item._finalFilename);

          // Small delay between downloads
          if (i < queue.length - 1) {
            await sleep(120);
          }
        } catch (err) {
          statusEl.className = 'status visible error';
          statusEl.textContent = `Error processing ${item.file.name}: ${err.message}`;
          convertAllBtn.disabled = false;
          return;
        }
      }

      statusEl.textContent = `Done! Downloaded ${queue.length} file(s).`;
      convertAllBtn.disabled = false;
    };

    function processImage(item) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        const ctx = canvas.getContext('2d');

        drawFitted(ctx, item.img, item.fit);
        const imageData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
        applyContrast(imageData, item.contrast);
        applyPosterize(imageData, item.posterize);

        resolve(createBMP(imageData));
      });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // BMP encoder (24-bit, top-down rows via negative height, BGR byte order)
    function createBMP(imageData) {
      const w = WIDTH, h = HEIGHT;
      const rowSize = Math.ceil(w * 3 / 4) * 4;
      const pixelDataSize = rowSize * h;
      const headerSize = 54;
      const fileSize = headerSize + pixelDataSize;

      const buffer = new ArrayBuffer(fileSize);
      const view = new DataView(buffer);

      // BMP Header
      view.setUint8(0, 0x42); // 'B'
      view.setUint8(1, 0x4D); // 'M'
      view.setUint32(2, fileSize, true);
      view.setUint32(6, 0, true); // reserved
      view.setUint32(10, headerSize, true);

      // DIB Header (BITMAPINFOHEADER)
      view.setUint32(14, 40, true); // header size
      view.setInt32(18, w, true);
      view.setInt32(22, -h, true); // negative = top-down
      view.setUint16(26, 1, true); // planes
      view.setUint16(28, 24, true); // bits per pixel
      view.setUint32(30, 0, true); // compression (none)
      view.setUint32(34, pixelDataSize, true);
      view.setUint32(38, 2835, true); // horizontal resolution (72 DPI)
      view.setUint32(42, 2835, true); // vertical resolution
      view.setUint32(46, 0, true); // colors in palette
      view.setUint32(50, 0, true); // important colors

      // Pixel data (BGR)
      const data = imageData.data;
      let offset = headerSize;
      for (let y = 0; y < h; y++) {
        const rowStart = offset;
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          view.setUint8(offset++, data[i + 2]); // B
          view.setUint8(offset++, data[i + 1]); // G
          view.setUint8(offset++, data[i]);     // R
        }
        // Row padding to 4-byte boundary
        const padding = rowSize - (offset - rowStart);
        for (let p = 0; p < padding; p++) {
          view.setUint8(offset++, 0);
        }
      }

      return new Blob([buffer], { type: 'image/bmp' });
    }
  </script>
</body>
</html>
