<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Reader Image Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111; color: #eee;
      min-height: 100vh; padding: 20px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
    .dropzone {
      border: 2px dashed #444; border-radius: 12px;
      padding: 40px 20px; text-align: center;
      cursor: pointer; margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .dropzone:hover { border-color: #666; }
    .dropzone.dragover { border-color: #fff; background: #222; }
    input[type="file"] { display: none; }
    .btn {
      display: block; width: 100%; padding: 14px;
      background: #333; color: #fff; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer;
      margin-bottom: 10px;
    }
    .btn:hover { background: #444; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #preview { max-width: 100%; border-radius: 8px; margin-bottom: 15px; }
    .info { font-size: 0.85rem; color: #888; margin-bottom: 20px; }
    .success { color: #4d4; text-align: center; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ E-Reader Converter</h1>
    <p class="info">Converts to 480×800 BMP for Xteink X4</p>
    
    <div class="dropzone" id="dropzone">
      <p>Tap to select image</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    
    <img id="preview" style="display:none">
    
    <button class="btn" id="convertBtn" disabled>Convert to BMP</button>
    <button class="btn" id="downloadBtn" style="display:none">Download BMP</button>
    
    <p class="success" id="success"></p>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const success = document.getElementById('success');
    
    let selectedFile = null;
    let bmpBlob = null;
    
    dropzone.onclick = () => fileInput.click();
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = () => dropzone.classList.remove('dragover');
    dropzone.ondrop = (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    
    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        convertBtn.disabled = false;
        downloadBtn.style.display = 'none';
        success.textContent = '';
      };
      reader.readAsDataURL(file);
    }
    
    convertBtn.onclick = async () => {
      const img = new Image();
      img.onload = async () => {
        // Resize to 480x800
        const canvas = document.createElement('canvas');
        canvas.width = 480;
        canvas.height = 800;
        const ctx = canvas.getContext('2d');
        
        // Center crop to fit aspect ratio
        const srcRatio = img.width / img.height;
        const dstRatio = 480 / 800;
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (srcRatio > dstRatio) {
          sw = img.height * dstRatio;
          sx = (img.width - sw) / 2;
        } else {
          sh = img.width / dstRatio;
          sy = (img.height - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 480, 800);
        
        // Convert to BMP
        const imageData = ctx.getImageData(0, 0, 480, 800);
        bmpBlob = createBMP(imageData);
        
        success.textContent = '✓ Converted! Download below.';
        downloadBtn.style.display = 'block';
      };
      img.src = preview.src;
    };
    
    downloadBtn.onclick = () => {
      if (!bmpBlob) return;
      const url = URL.createObjectURL(bmpBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sleep_screen.bmp';
      a.click();
      URL.revokeObjectURL(url);
    };
    
    // Simple BMP encoder
    function createBMP(imageData) {
      const w = 480, h = 800;
      const rowSize = Math.ceil(w * 3 / 4) * 4;
      const pixelDataSize = rowSize * h;
      const headerSize = 54;
      const fileSize = headerSize + pixelDataSize;
      
      const buffer = new ArrayBuffer(fileSize);
      const view = new DataView(buffer);
      
      // BMP Header
      view.setUint8(0, 0x42); view.setUint8(1, 0x4D);
      view.setUint32(2, fileSize, true);
      view.setUint32(10, headerSize, true);
      
      // DIB Header
      view.setUint32(14, 40, true);
      view.setInt32(18, w, true);
      view.setInt32(22, -h, true); // negative = top-down
      view.setUint16(26, 1, true);
      view.setUint16(28, 24, true);
      view.setUint32(34, pixelDataSize, true);
      
      // Pixel data (BGR)
      const data = imageData.data;
      let offset = headerSize;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          view.setUint8(offset++, data[i + 2]); // B
          view.setUint8(offset++, data[i + 1]); // G
          view.setUint8(offset++, data[i]);     // R
        }
        // Padding
        while (offset % 4 !== headerSize % 4) offset++;
      }
      
      return new Blob([buffer], { type: 'image/bmp' });
    }
  </script>
</body>
</html>
