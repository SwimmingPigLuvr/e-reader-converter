<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Reader Image Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111; color: #eee;
      min-height: 100vh; padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; text-align: center; }
    .info { font-size: 0.85rem; color: #888; margin-bottom: 20px; text-align: center; }

    .dropzone {
      border: 2px dashed #444; border-radius: 12px;
      padding: 40px 20px; text-align: center;
      cursor: pointer; margin-bottom: 20px;
      transition: border-color 0.2s, background 0.2s;
    }
    .dropzone:hover { border-color: #666; }
    .dropzone.dragover { border-color: #fff; background: #222; }
    .dropzone.minimized { padding: 12px; margin-bottom: 16px; }
    .dropzone.minimized p { font-size: 0.85rem; }
    input[type="file"] { display: none; }

    .btn {
      display: inline-block; padding: 10px 16px;
      background: #333; color: #fff; border: none;
      border-radius: 8px; font-size: 0.9rem; cursor: pointer;
    }
    .btn:hover { background: #444; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2a6; }
    .btn-primary:hover { background: #3b7; }
    .btn-danger { background: #a33; }
    .btn-danger:hover { background: #c44; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* Editor - Two column layout */
    .editor { display: none; }
    .editor.visible { display: block; }

    .editor-layout {
      display: flex; gap: 32px;
      align-items: flex-start;
    }

    /* Left column: controls */
    .left-column {
      flex: 1; min-width: 320px; max-width: 420px;
    }

    /* Right column: device mockup */
    .right-column {
      flex: 0 0 auto;
      position: sticky;
      top: 20px;
    }

    /* Navigation */
    .nav-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px;
      padding: 12px; background: #1a1a1a; border-radius: 8px;
    }
    .nav-row .counter { font-size: 0.9rem; color: #888; }
    .nav-row .counter strong { color: #eee; }
    .nav-buttons { display: flex; gap: 8px; }

    /* Original image */
    .original-section {
      margin-bottom: 16px;
    }
    .original-box {
      background: #1a1a1a; border-radius: 8px; padding: 12px;
      border: 1px solid #333;
    }
    .section-label {
      font-size: 0.75rem; color: #666; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .original-img {
      width: 100%; max-width: 200px; height: auto;
      aspect-ratio: 480 / 800;
      object-fit: contain;
      border-radius: 4px; background: #000;
    }
    .file-info {
      font-size: 0.85rem; color: #888; margin-top: 10px;
    }
    .file-info strong { color: #ccc; }

    /* Controls */
    .controls-section {
      background: #1a1a1a; border-radius: 8px; padding: 16px;
      border: 1px solid #333; margin-bottom: 16px;
    }
    .control-group {
      margin-bottom: 14px;
    }
    .control-group:last-child { margin-bottom: 0; }
    .control-group label {
      display: block; font-size: 0.8rem; color: #888;
      margin-bottom: 6px;
    }
    .control-group select, .control-group input[type="text"] {
      width: 100%; padding: 10px 12px;
      background: #222; border: 1px solid #444;
      border-radius: 8px; color: #eee; font-size: 0.9rem;
    }
    .control-group input[type="text"] { font-family: monospace; font-size: 0.8rem; }
    .slider-row {
      display: flex; align-items: center; gap: 12px;
    }
    .slider-row input[type="range"] {
      flex: 1; accent-color: #2a6;
    }
    .slider-value {
      min-width: 40px; text-align: center;
      font-size: 0.9rem; color: #aaa;
    }

    /* Thumbnail strip */
    .thumb-strip {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 12px; background: #1a1a1a; border-radius: 8px;
      margin-bottom: 16px; border: 1px solid #333;
    }
    .thumb-strip::-webkit-scrollbar { height: 6px; }
    .thumb-strip::-webkit-scrollbar-track { background: #222; border-radius: 3px; }
    .thumb-strip::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    .thumb-item {
      flex-shrink: 0; width: 36px; height: 60px;
      border-radius: 4px; cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden; position: relative;
    }
    .thumb-item.active { border-color: #2a6; }
    .thumb-item img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .thumb-item .thumb-remove {
      position: absolute; top: 2px; right: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(0,0,0,0.7); border: none; color: #888;
      cursor: pointer; font-size: 10px; line-height: 1;
      display: none;
    }
    .thumb-item:hover .thumb-remove { display: block; }
    .thumb-item .thumb-remove:hover { background: #a33; color: #fff; }

    /* Apply to all */
    .apply-panel {
      display: none; background: #1a1a1a; border-radius: 8px;
      padding: 14px; margin-bottom: 16px; border: 1px solid #333;
    }
    .apply-panel.visible { display: block; }
    .apply-panel h3 {
      font-size: 0.8rem; margin-bottom: 12px; color: #666;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .apply-row {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    }
    .apply-row .control-group { flex: 1; min-width: 100px; margin-bottom: 0; }
    .apply-row .control-group select { padding: 8px 10px; font-size: 0.8rem; }
    .apply-row .btn-group { display: flex; gap: 8px; }

    /* Actions */
    .actions {
      display: flex; gap: 12px; flex-wrap: wrap;
    }

    /* Status */
    .status {
      text-align: center; padding: 12px;
      background: #1a2a1a; border-radius: 8px;
      color: #4d4; margin-bottom: 16px;
      display: none;
    }
    .status.visible { display: block; }
    .status.error { background: #2a1a1a; color: #d44; }

    /* ============================================
       DEVICE MOCKUP - Large right side
       ============================================ */
    .device-wrapper {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .device-color-toggle {
      display: flex; gap: 10px; align-items: center;
    }
    .device-color-toggle span {
      font-size: 0.8rem; color: #888;
    }
    .color-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid #444; cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }
    .color-btn:hover { transform: scale(1.1); }
    .color-btn.active { border-color: #2a6; border-width: 3px; }
    .color-btn.black { background: linear-gradient(145deg, #2a2a2a, #1a1a1a); }
    .color-btn.white { background: linear-gradient(145deg, #f5f5f0, #e8e8e3); }

    /* Device frame - scaled to show 480x800 at good size */
    .device-frame {
      position: relative;
      /* Bezels: top 28px, sides 18px, bottom 40px */
      padding: 28px 18px 40px 18px;
      border-radius: 24px;
      box-shadow:
        0 25px 80px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.05) inset;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .device-frame.black {
      background: linear-gradient(165deg, #2d2d2d 0%, #1a1a1a 50%, #0d0d0d 100%);
    }
    .device-frame.white {
      background: linear-gradient(165deg, #f0f0eb 0%, #e5e5e0 50%, #d8d8d3 100%);
      box-shadow:
        0 25px 80px rgba(0,0,0,0.35),
        0 0 0 1px rgba(255,255,255,0.4) inset;
    }

    /* Device branding */
    .device-frame::before {
      content: 'XTEINK';
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      opacity: 0.5;
    }
    .device-frame.black::before { color: #555; }
    .device-frame.white::before { color: #aaa; }

    /* Power button on right side */
    .device-frame::after {
      content: '';
      position: absolute;
      top: 80px;
      right: -4px;
      width: 4px;
      height: 40px;
      border-radius: 0 3px 3px 0;
      transition: background 0.3s;
    }
    .device-frame.black::after { background: linear-gradient(180deg, #3a3a3a, #2a2a2a); }
    .device-frame.white::after { background: linear-gradient(180deg, #d0d0d0, #bbb); }

    /* E-ink screen - LARGE */
    .eink-screen {
      position: relative;
      width: 288px;  /* 480 * 0.6 */
      height: 480px; /* 800 * 0.6 */
      border-radius: 3px;
      overflow: hidden;
      /* E-ink paper color - slightly warm/gray off-white */
      background: #d8d6d0;
      /* Recessed screen effect */
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.12),
        inset 0 0 0 1px rgba(0,0,0,0.1);
    }

    /* Paper texture overlay */
    .eink-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 2;
    }

    .preview-canvas {
      display: block;
      width: 288px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* GRAYSCALE - e-ink has no color! Plus slight contrast reduction for realism */
      filter: grayscale(100%) contrast(0.9);
    }

    .device-specs {
      font-size: 0.7rem;
      color: #555;
      text-align: center;
      margin-top: 8px;
    }

    /* Responsive: stack on smaller screens */
    @media (max-width: 900px) {
      .editor-layout {
        flex-direction: column-reverse;
      }
      .right-column {
        position: static;
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }
      .left-column {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>E-Reader Converter</h1>
    <p class="info">Converts to 480x800 BMP for Xteink X4</p>

    <div class="dropzone" id="dropzone">
      <p>Drop images here or tap to select</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>

    <div class="editor" id="editor">
      <div class="editor-layout">
        <!-- Left column: controls -->
        <div class="left-column">
          <div class="nav-row">
            <div class="counter">
              Image <strong><span id="currentIndex">1</span></strong> of <strong><span id="totalCount">1</span></strong>
            </div>
            <div class="nav-buttons">
              <button class="btn btn-sm" id="prevBtn">&larr; Prev</button>
              <button class="btn btn-sm" id="nextBtn">Next &rarr;</button>
            </div>
          </div>

          <div class="original-section">
            <div class="original-box">
              <div class="section-label">Original</div>
              <img class="original-img" id="originalImg">
              <div class="file-info" id="fileInfo"></div>
            </div>
          </div>

          <div class="controls-section">
            <div class="control-group">
              <label>Fit Mode</label>
              <select id="fitSelect">
                <option value="crop">Center crop (fill)</option>
                <option value="letterbox-white">Letterbox (white)</option>
                <option value="letterbox-black">Letterbox (black)</option>
                <option value="stretch">Stretch (smush)</option>
              </select>
            </div>

            <div class="control-group">
              <label>Contrast</label>
              <div class="slider-row">
                <input type="range" id="contrastSlider" min="-100" max="100" value="0">
                <span class="slider-value" id="contrastValue">0</span>
              </div>
            </div>

            <div class="control-group">
              <label>Posterize / Dither</label>
              <select id="posterizeSelect">
                <option value="off">Off (full grayscale)</option>
                <option value="16">16 shades</option>
                <option value="8">8 shades</option>
                <option value="4">4 shades</option>
                <option value="2">2 shades (B&W)</option>
                <option value="16d">16 shades + dither</option>
                <option value="8d">8 shades + dither</option>
                <option value="4d">4 shades + dither</option>
                <option value="2d">2 shades + dither</option>
              </select>
            </div>

            <div class="control-group">
              <label>Output Filename</label>
              <input type="text" id="filenameInput">
            </div>
          </div>

          <div class="thumb-strip" id="thumbStrip"></div>

          <div class="apply-panel" id="applyPanel">
            <h3>Apply to All</h3>
            <div class="apply-row">
              <div class="control-group">
                <label>Fit</label>
                <select id="applyFit">
                  <option value="">--</option>
                  <option value="crop">Crop</option>
                  <option value="letterbox-white">Letterbox W</option>
                  <option value="letterbox-black">Letterbox B</option>
                  <option value="stretch">Stretch</option>
                </select>
              </div>
              <div class="control-group">
                <label>Contrast</label>
                <div class="slider-row">
                  <input type="range" id="applyContrast" min="-100" max="100" value="0" style="width:80px">
                  <span class="slider-value" id="applyContrastValue">0</span>
                </div>
              </div>
              <div class="control-group">
                <label>Posterize</label>
                <select id="applyPosterize">
                  <option value="">--</option>
                  <option value="off">Off</option>
                  <option value="16">16</option>
                  <option value="8">8</option>
                  <option value="4">4</option>
                  <option value="2">2</option>
                  <option value="16d">16+D</option>
                  <option value="8d">8+D</option>
                  <option value="4d">4+D</option>
                  <option value="2d">2+D</option>
                </select>
              </div>
              <div class="btn-group">
                <button class="btn btn-sm" id="applyBtn">Apply</button>
                <button class="btn btn-sm btn-danger" id="clearBtn">Clear</button>
              </div>
            </div>
          </div>

          <div class="status" id="status"></div>

          <div class="actions">
            <button class="btn btn-primary" id="convertAllBtn">Convert & Download All</button>
          </div>
        </div>

        <!-- Right column: device mockup -->
        <div class="right-column">
          <div class="device-wrapper">
            <div class="device-color-toggle">
              <span>Device color:</span>
              <button class="color-btn black active" id="colorBlack" title="Space Black"></button>
              <button class="color-btn white" id="colorWhite" title="Pearl White"></button>
            </div>
            <div class="device-frame black" id="deviceFrame">
              <div class="eink-screen">
                <canvas class="preview-canvas" id="previewCanvas" width="288" height="480"></canvas>
              </div>
            </div>
            <div class="device-specs">
              4.3" E Ink &bull; 480x800 &bull; 220 PPI &bull; Grayscale
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WIDTH = 480, HEIGHT = 800;
    const PREVIEW_W = 288, PREVIEW_H = 480;

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const editor = document.getElementById('editor');
    const thumbStrip = document.getElementById('thumbStrip');
    const applyPanel = document.getElementById('applyPanel');
    const convertAllBtn = document.getElementById('convertAllBtn');
    const statusEl = document.getElementById('status');

    const originalImg = document.getElementById('originalImg');
    const previewCanvas = document.getElementById('previewCanvas');
    const previewCtx = previewCanvas.getContext('2d');
    const fileInfoEl = document.getElementById('fileInfo');
    const deviceFrame = document.getElementById('deviceFrame');

    const fitSelect = document.getElementById('fitSelect');
    const contrastSlider = document.getElementById('contrastSlider');
    const contrastValue = document.getElementById('contrastValue');
    const posterizeSelect = document.getElementById('posterizeSelect');
    const filenameInput = document.getElementById('filenameInput');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentIndexEl = document.getElementById('currentIndex');
    const totalCountEl = document.getElementById('totalCount');

    const colorBlack = document.getElementById('colorBlack');
    const colorWhite = document.getElementById('colorWhite');

    let queue = [];
    let currentIdx = 0;
    let idCounter = 0;

    // Device color toggle
    colorBlack.onclick = () => {
      colorBlack.classList.add('active');
      colorWhite.classList.remove('active');
      deviceFrame.classList.remove('white');
      deviceFrame.classList.add('black');
    };
    colorWhite.onclick = () => {
      colorWhite.classList.add('active');
      colorBlack.classList.remove('active');
      deviceFrame.classList.remove('black');
      deviceFrame.classList.add('white');
    };

    // Dropzone events
    dropzone.onclick = () => fileInput.click();
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = () => dropzone.classList.remove('dragover');
    dropzone.ondrop = (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    };
    fileInput.onchange = (e) => { handleFiles(e.target.files); fileInput.value = ''; };

    function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        addToQueue(file);
      }
    }

    function addToQueue(file) {
      const id = ++idCounter;
      const baseName = file.name.replace(/\.[^.]+$/, '');
      const timestamp = formatTimestamp(new Date());
      const item = {
        id,
        file,
        img: null,
        fit: 'crop',
        contrast: 0,
        posterize: 'off',
        filename: `${baseName}_480x800_${timestamp}.bmp`
      };
      queue.push(item);

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          item.img = img;
          renderThumbnails();
          if (queue.length === 1 || queue[currentIdx]?.id === item.id) {
            showImage(queue.length - 1);
          }
          updateUI();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);

      updateUI();
    }

    function formatTimestamp(date) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function removeFromQueue(id) {
      const idx = queue.findIndex(item => item.id === id);
      if (idx === -1) return;
      queue.splice(idx, 1);
      if (queue.length === 0) {
        currentIdx = 0;
      } else if (currentIdx >= queue.length) {
        currentIdx = queue.length - 1;
      }
      renderThumbnails();
      if (queue.length > 0) {
        showImage(currentIdx);
      }
      updateUI();
    }

    function updateUI() {
      const hasImages = queue.length > 0;
      const allLoaded = queue.every(item => item.img);

      editor.classList.toggle('visible', hasImages);
      dropzone.classList.toggle('minimized', hasImages);
      applyPanel.classList.toggle('visible', queue.length >= 2);
      convertAllBtn.disabled = !hasImages || !allLoaded;

      totalCountEl.textContent = queue.length;
      currentIndexEl.textContent = queue.length > 0 ? currentIdx + 1 : 0;
      prevBtn.disabled = currentIdx === 0;
      nextBtn.disabled = currentIdx >= queue.length - 1;
    }

    function renderThumbnails() {
      thumbStrip.innerHTML = '';
      queue.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'thumb-item' + (idx === currentIdx ? ' active' : '');
        div.innerHTML = `
          <img src="${item.img ? item.img.src : ''}">
          <button class="thumb-remove">&times;</button>
        `;
        div.onclick = (e) => {
          if (e.target.classList.contains('thumb-remove')) {
            removeFromQueue(item.id);
          } else {
            showImage(idx);
          }
        };
        thumbStrip.appendChild(div);
      });
    }

    function showImage(idx) {
      if (idx < 0 || idx >= queue.length) return;

      if (queue[currentIdx]) {
        saveCurrentSettings();
      }

      currentIdx = idx;
      const item = queue[idx];

      if (!item.img) return;

      originalImg.src = item.img.src;
      fileInfoEl.innerHTML = `<strong>${item.file.name}</strong><br>${item.img.width} x ${item.img.height}`;

      fitSelect.value = item.fit;
      contrastSlider.value = item.contrast;
      contrastValue.textContent = item.contrast;
      posterizeSelect.value = item.posterize;
      filenameInput.value = item.filename;

      updatePreview();
      renderThumbnails();
      updateUI();
    }

    function saveCurrentSettings() {
      const item = queue[currentIdx];
      if (!item) return;
      item.fit = fitSelect.value;
      item.contrast = parseInt(contrastSlider.value);
      item.posterize = posterizeSelect.value;
      item.filename = filenameInput.value;
    }

    function updatePreview() {
      const item = queue[currentIdx];
      if (!item || !item.img) return;

      const fullCanvas = document.createElement('canvas');
      fullCanvas.width = WIDTH;
      fullCanvas.height = HEIGHT;
      const fullCtx = fullCanvas.getContext('2d');

      drawFitted(fullCtx, item.img, fitSelect.value);
      const imageData = fullCtx.getImageData(0, 0, WIDTH, HEIGHT);
      applyContrast(imageData, parseInt(contrastSlider.value));
      applyPosterize(imageData, posterizeSelect.value);
      fullCtx.putImageData(imageData, 0, 0);

      previewCtx.imageSmoothingEnabled = false;
      previewCtx.drawImage(fullCanvas, 0, 0, PREVIEW_W, PREVIEW_H);
    }

    fitSelect.onchange = () => { saveCurrentSettings(); updatePreview(); };
    contrastSlider.oninput = () => {
      contrastValue.textContent = contrastSlider.value;
      saveCurrentSettings();
      updatePreview();
    };
    posterizeSelect.onchange = () => { saveCurrentSettings(); updatePreview(); };
    filenameInput.oninput = () => { saveCurrentSettings(); };

    prevBtn.onclick = () => { if (currentIdx > 0) showImage(currentIdx - 1); };
    nextBtn.onclick = () => { if (currentIdx < queue.length - 1) showImage(currentIdx + 1); };

    document.getElementById('applyContrast').oninput = (e) => {
      document.getElementById('applyContrastValue').textContent = e.target.value;
    };

    document.getElementById('applyBtn').onclick = () => {
      const fit = document.getElementById('applyFit').value;
      const contrast = parseInt(document.getElementById('applyContrast').value);
      const posterize = document.getElementById('applyPosterize').value;

      for (const item of queue) {
        if (fit) item.fit = fit;
        item.contrast = contrast;
        if (posterize) item.posterize = posterize;
      }

      showImage(currentIdx);
    };

    document.getElementById('clearBtn').onclick = () => {
      queue = [];
      currentIdx = 0;
      thumbStrip.innerHTML = '';
      updateUI();
    };

    convertAllBtn.onclick = async () => {
      if (queue.length === 0) return;

      saveCurrentSettings();
      convertAllBtn.disabled = true;
      statusEl.className = 'status visible';

      const filenames = new Map();
      for (const item of queue) {
        let name = item.filename.trim();
        if (!name.toLowerCase().endsWith('.bmp')) name += '.bmp';

        const baseName = name.slice(0, -4);
        let finalName = name;
        let counter = 2;
        while (filenames.has(finalName.toLowerCase())) {
          finalName = `${baseName}_${counter}.bmp`;
          counter++;
        }
        filenames.set(finalName.toLowerCase(), item);
        item._finalFilename = finalName;
      }

      for (let i = 0; i < queue.length; i++) {
        const item = queue[i];
        statusEl.textContent = `Converting ${i + 1}/${queue.length}...`;

        try {
          const blob = await processImage(item);
          downloadBlob(blob, item._finalFilename);

          if (i < queue.length - 1) {
            await sleep(120);
          }
        } catch (err) {
          statusEl.className = 'status visible error';
          statusEl.textContent = `Error: ${err.message}`;
          convertAllBtn.disabled = false;
          return;
        }
      }

      statusEl.textContent = `Done! Downloaded ${queue.length} file(s).`;
      convertAllBtn.disabled = false;
    };

    function drawFitted(ctx, img, fit) {
      const srcRatio = img.width / img.height;
      const dstRatio = WIDTH / HEIGHT;

      if (fit === 'crop') {
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (srcRatio > dstRatio) {
          sw = img.height * dstRatio;
          sx = (img.width - sw) / 2;
        } else {
          sh = img.width / dstRatio;
          sy = (img.height - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, WIDTH, HEIGHT);
      } else if (fit === 'letterbox-white' || fit === 'letterbox-black') {
        ctx.fillStyle = fit === 'letterbox-white' ? '#fff' : '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        let dw, dh, dx, dy;
        if (srcRatio > dstRatio) {
          dw = WIDTH;
          dh = WIDTH / srcRatio;
          dx = 0;
          dy = (HEIGHT - dh) / 2;
        } else {
          dh = HEIGHT;
          dw = HEIGHT * srcRatio;
          dx = (WIDTH - dw) / 2;
          dy = 0;
        }
        ctx.drawImage(img, dx, dy, dw, dh);
      } else if (fit === 'stretch') {
        ctx.drawImage(img, 0, 0, WIDTH, HEIGHT);
      }
    }

    function applyContrast(imageData, amount) {
      if (amount === 0) return;
      const data = imageData.data;
      const factor = (259 * (amount + 255)) / (255 * (259 - amount));
      for (let i = 0; i < data.length; i += 4) {
        data[i] = clamp(factor * (data[i] - 128) + 128);
        data[i + 1] = clamp(factor * (data[i + 1] - 128) + 128);
        data[i + 2] = clamp(factor * (data[i + 2] - 128) + 128);
      }
    }

    function applyPosterize(imageData, mode) {
      if (mode === 'off') return;

      const data = imageData.data;
      const dither = mode.endsWith('d');
      const shades = parseInt(mode);
      const step = 255 / (shades - 1);

      const gray = new Float32Array(WIDTH * HEIGHT);
      for (let i = 0; i < gray.length; i++) {
        const idx = i * 4;
        gray[i] = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
      }

      if (dither) {
        for (let y = 0; y < HEIGHT; y++) {
          for (let x = 0; x < WIDTH; x++) {
            const i = y * WIDTH + x;
            const oldVal = gray[i];
            const newVal = Math.round(oldVal / step) * step;
            gray[i] = newVal;
            const error = oldVal - newVal;

            if (x + 1 < WIDTH) gray[i + 1] += error * 7 / 16;
            if (y + 1 < HEIGHT) {
              if (x > 0) gray[i + WIDTH - 1] += error * 3 / 16;
              gray[i + WIDTH] += error * 5 / 16;
              if (x + 1 < WIDTH) gray[i + WIDTH + 1] += error * 1 / 16;
            }
          }
        }
      } else {
        for (let i = 0; i < gray.length; i++) {
          gray[i] = Math.round(gray[i] / step) * step;
        }
      }

      for (let i = 0; i < gray.length; i++) {
        const v = clamp(gray[i]);
        const idx = i * 4;
        data[idx] = data[idx + 1] = data[idx + 2] = v;
      }
    }

    function clamp(v) {
      return Math.max(0, Math.min(255, Math.round(v)));
    }

    function processImage(item) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        const ctx = canvas.getContext('2d');

        drawFitted(ctx, item.img, item.fit);
        const imageData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
        applyContrast(imageData, item.contrast);
        applyPosterize(imageData, item.posterize);

        resolve(createBMP(imageData));
      });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function createBMP(imageData) {
      const w = WIDTH, h = HEIGHT;
      const rowSize = Math.ceil(w * 3 / 4) * 4;
      const pixelDataSize = rowSize * h;
      const headerSize = 54;
      const fileSize = headerSize + pixelDataSize;

      const buffer = new ArrayBuffer(fileSize);
      const view = new DataView(buffer);

      view.setUint8(0, 0x42);
      view.setUint8(1, 0x4D);
      view.setUint32(2, fileSize, true);
      view.setUint32(6, 0, true);
      view.setUint32(10, headerSize, true);

      view.setUint32(14, 40, true);
      view.setInt32(18, w, true);
      view.setInt32(22, -h, true);
      view.setUint16(26, 1, true);
      view.setUint16(28, 24, true);
      view.setUint32(30, 0, true);
      view.setUint32(34, pixelDataSize, true);
      view.setUint32(38, 2835, true);
      view.setUint32(42, 2835, true);
      view.setUint32(46, 0, true);
      view.setUint32(50, 0, true);

      const data = imageData.data;
      let offset = headerSize;
      for (let y = 0; y < h; y++) {
        const rowStart = offset;
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          view.setUint8(offset++, data[i + 2]);
          view.setUint8(offset++, data[i + 1]);
          view.setUint8(offset++, data[i]);
        }
        const padding = rowSize - (offset - rowStart);
        for (let p = 0; p < padding; p++) {
          view.setUint8(offset++, 0);
        }
      }

      return new Blob([buffer], { type: 'image/bmp' });
    }
  </script>
</body>
</html>
